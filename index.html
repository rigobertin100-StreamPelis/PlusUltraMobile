<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusUltra Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: #000; color: white; padding-top: 110px; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* HEADER */
        .header { 
            position: fixed; top: 20px; left: 15px; right: 15px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px 20px; z-index: 1000; 
            background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(25px); 
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); 
            box-sizing: border-box; 
        }
        .logo{font-size:26px;font-weight:700;color:#0a84ff;}
        .header-right{display:flex;align-items:center;gap:12px;}
        .search {padding:10px 16px;border-radius:18px;border:none;font-size:15px;background:rgba(255,255,255,.1);color:white;width:140px; outline:none;}
        .logout{padding:10px 16px;border:none;border-radius:14px;background:#ff3b30;color:#fff;font-weight:bold;cursor:pointer;}

        .hero-banner { position: relative; width: 100%; height: 60vh; background: #111 center/cover no-repeat; overflow: hidden; margin-top: -110px; display: none; }
        .hero-overlay {position: absolute; inset: 0; background: linear-gradient(to top, #000 5%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; z-index: 2;}
        #heroTitle {font-size: 32px; margin: 0; font-weight: 800;}
        .hero-btn {width: fit-content; padding: 12px 28px; background: #fff; color: #000; border-radius: 12px; font-weight: bold; border:none; margin-top: 15px; cursor: pointer;}

        .row{margin-top:35px;padding-left:20px;}
        .row h2{font-size:19px;margin-bottom:12px;color:rgba(255,255,255,0.9); font-weight: 700;}
        .carousel{display:flex;gap:12px;overflow-x:auto;padding-bottom:15px;scroll-behavior:smooth;}
        .carousel::-webkit-scrollbar{display: none;}
        
        .card { width:150px;flex-shrink:0;aspect-ratio:2/3;position:relative;border-radius:14px;overflow:hidden;background: #1c1c1e; cursor: pointer;}
        .card img{width:100%;height:100%;object-fit:cover;}

        /* MODAL Y PLAYER */
        .series-modal{position:fixed;inset:0;display:none;z-index:9999; background:#000;}
        .series-inner{width:100%;height:100%;background:#1c1c1e;overflow-y:auto;}
        .modal-hero {width:100%; height:45vh; background-size: cover; background-position: center; position: relative;}
        .modal-info-content {padding: 20px; margin-top: -60px; position: relative; z-index: 2;}
        
        .player{position:fixed;inset:0;display:none;z-index:10000; background:#000; align-items: center; justify-content: center;}
        .player video { width: 100%; height: 100%; object-fit: contain; }
        .close{position:absolute;top:30px;right:25px;font-size:20px;color:white;z-index:10001; background: rgba(0,0,0,0.5); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer;}
        
        .episode-list{padding: 20px; display:flex; flex-direction:column; gap:10px;}
        .episode-list button {padding: 18px; background: #2c2c2e; border: none; border-radius: 12px; color: white; text-align: left; font-size: 15px;}
        
        #loginModal {position:fixed;inset:0;background:#000;display:none;justify-content:center;align-items:center;z-index:99999;}
        #loginBox {background:#1c1c1e;padding:40px;border-radius:24px;display:flex;flex-direction:column;gap:18px;width:85%; max-width: 320px;}
        #loginBox input, #loginBox button {padding:15px;border-radius:12px;border:none;}
        #loginBox input {background:#2c2c2e;color:white;}
        #loginBox button {background:#0a84ff;color:#fff;font-weight:bold;}

        .btn-play-now {padding: 16px; background: #0a84ff; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: bold; width: 100%; margin-top: 20px; cursor: pointer;}
        .btn-watch-later { width: 54px; height: 54px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer;}
        .btn-watch-later.active { background: #0a84ff; }

        .continue-overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
        .continue-line{height:3px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;}
        .continue-progress{height:100%;background:#0a84ff;}
    </style>
</head>

<body>

<div id="loginModal">
    <div id="loginBox">
        <h2 style="text-align:center">PlusUltra</h2>
        <input id="loginUser" type="email" placeholder="Usuario">
        <input id="loginPass" type="password" placeholder="Contraseña">
        <button id="loginBtn">Entrar</button>
        <p id="loginError" style="color:#ff453a; display:none; text-align:center">Error de acceso</p>
    </div>
</div>

<div class="header">
    <div class="logo">PlusUltra</div>
    <div class="header-right">
        <input id="search" class="search" placeholder="Buscar...">
        <button class="logout" onclick="logout()">Salir</button>
    </div>
</div>

<div id="heroBanner" class="hero-banner">
    <div class="hero-overlay">
        <h1 id="heroTitle"></h1>
        <button id="heroPlayBtn" class="hero-btn">▶ Ver Ahora</button>
    </div>
</div>

<div id="searchResultsContainer" class="row" style="display:none;">
    <h2>🔍 Resultados</h2>
    <div class="carousel" id="searchResultsRow"></div>
</div>

<div id="mainCatalog">
    <div id="app"></div>
</div>

<div class="player" id="player">
    <span class="close" onclick="window.closeVideo()">✕</span>
    <video id="video" playsinline controls></video>
</div>

<div class="series-modal" id="seriesModal">
    <div class="series-inner" id="modalScroll">
        <span class="close" onclick="window.closeSeriesModal()">✕</span>
        <div class="modal-hero" id="modalHero"></div>
        <div class="modal-info-content">
            <h1 class="tmdb-title" id="seriesTitle"></h1>
            <div id="tmdbMeta" style="color:#0a84ff; margin:8px 0; font-weight:600;"></div>
            <div id="tmdbOverview" style="color:rgba(255,255,255,0.8); line-height:1.5;"></div>
            
            <div style="display:flex; gap:15px; align-items:center; margin-top:20px;">
                <button class="btn-watch-later" id="modalWatchLaterBtn">+</button>
                <button class="btn-play-now" id="modalPlayBtn">Reproducir</button>
            </div>
        </div>
        <div id="seasonSelect" style="display:flex; gap:10px; overflow-x:auto; padding:10px 20px;"></div>
        <div class="episode-list" id="episodeList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyAt1E2XmlsxV52dAwRaXW_e4XdDQxiP8lg",
    authDomain: "midata-40f73.firebaseapp.com",
    projectId: "midata-40f73",
    storageBucket: "midata-40f73.firebasestorage.app",
    messagingSenderId: "104287406146",
    appId: "1:104287406146:web:d9fad446e22629559dc5db"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);

let allVideos = [];
let currentSeries = null;
const WORKER_URL = "https://odd-credit-e6f8.rigobertin100.workers.dev";
const WATCHLATER_KEY = "plus_ultra_watchlater";
const PROGRESS_KEY = "plus_ultra_progress";
const TMDB_API_KEY = "eb68625e114563a6e99084803989c46d";

// --- REPRODUCTOR CORREGIDO ---
const playerController = {
    video: null, hls: null, currentId: null,
    init() {
        this.video = document.getElementById("video");
        this.video.ontimeupdate = () => {
            if (this.currentId && this.video.currentTime > 5) {
                const data = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");
                data[this.currentId] = { time: this.video.currentTime, duration: this.video.duration, updated: Date.now() };
                localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
            }
        };
    },
    async play(v) {
        this.cleanup();
        this.currentId = v.titulo;
        document.getElementById("player").style.display = "flex";
        
        const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}")[this.currentId];

        if (v.url.includes(".m3u8")) {
            if (Hls.isSupported()) {
                this.hls = new Hls();
                this.hls.loadSource(v.url);
                this.hls.attachMedia(this.video);
                this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if(saved) this.video.currentTime = saved.time;
                    this.video.play().catch(e => console.error("Error autoplay:", e));
                });
            } else if (this.video.canPlayType('application/vnd.apple.mpegurl')) {
                this.video.src = v.url;
                if(saved) this.video.currentTime = saved.time;
                this.video.play();
            }
        } else {
            this.video.src = v.url;
            this.video.onloadedmetadata = () => {
                if(saved) this.video.currentTime = saved.time;
                this.video.play();
            };
        }
    },
    cleanup() {
        if (this.hls) { this.hls.destroy(); this.hls = null; }
        this.video.pause();
        this.video.removeAttribute('src');
        this.video.load();
    }
};

window.openVideo = (v) => {
    document.getElementById("seriesModal").style.display = "none";
    playerController.play(v);
};

window.closeVideo = () => {
    playerController.cleanup();
    document.getElementById("player").style.display = "none";
    renderContinue();
};

// --- RESTO DE LOGICA ---
function buildUI(){
    document.getElementById("app").innerHTML = `
        <div class="row" id="recentHeader"><h2>🆕 Recién agregadas</h2><div class="carousel" id="recentRow"></div></div>
        <div class="row" id="contHeader"><h2>🔄 Continuar viendo</h2><div class="carousel" id="continueRow"></div></div>
        <div class="row" id="watchLaterHeader" style="display:none;"><h2>❤️ Mirar Después</h2><div class="carousel" id="watchLaterRow"></div></div>
        <div class="row"><h2>🍿 Cine</h2><div class="carousel" id="cineRow"></div></div>
        <div class="row"><h2>🎬 Películas</h2><div class="carousel" id="peliculasRow"></div></div>
        <div class="row"><h2>📺 Series</h2><div class="carousel" id="seriesRow"></div></div>`;
    renderAll();
    setupHero();
}

function renderAll(){
    const shuffle = (data) => data.sort(() => Math.random() - 0.5);
    renderCarousel("recentRow", [...allVideos].reverse().slice(0, 20));
    renderCarousel("cineRow", shuffle(allVideos.filter(v => v.tipo === "cine")));
    renderCarousel("peliculasRow", shuffle(allVideos.filter(v => v.tipo === "pelicula")));
    renderCarousel("seriesRow", allVideos.filter(v => v.tipo === "serie" || v.tipo === "anime"));
    renderContinue();
    renderWatchLater();
}

function renderCarousel(id, data) {
    const container = document.getElementById(id);
    if (!container) return;
    container.innerHTML = "";
    data.forEach(v => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => window.openSeriesModal(v);
        card.innerHTML = `<img src="${v.img}">`;
        container.appendChild(card);
    });
}

document.getElementById("search").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase().trim();
    const resCont = document.getElementById("searchResultsContainer");
    const resRow = document.getElementById("searchResultsRow");
    if (val.length > 0) {
        document.getElementById("mainCatalog").style.display = "none";
        document.getElementById("heroBanner").style.display = "none";
        resCont.style.display = "block";
        resRow.innerHTML = "";
        allVideos.filter(v => v.titulo.toLowerCase().includes(val)).forEach(v => {
            const card = document.createElement("div");
            card.className = "card";
            card.onclick = () => window.openSeriesModal(v);
            card.innerHTML = `<img src="${v.img}">`;
            resRow.appendChild(card);
        });
    } else {
        document.getElementById("mainCatalog").style.display = "block";
        document.getElementById("heroBanner").style.display = "block";
        resCont.style.display = "none";
    }
});

window.openSeriesModal = async (v) => {
    currentSeries = v;
    const modal = document.getElementById("seriesModal");
    modal.style.display = "flex";
    document.getElementById("seriesTitle").innerText = v.titulo;
    document.getElementById("modalHero").style.backgroundImage = `url(${v.img})`;
    document.getElementById("tmdbOverview").innerText = "Cargando descripción...";
    
    // TMDB con manejo de error 401
    try {
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(v.titulo)}&language=es-MX`);
        if (res.ok) {
            const data = await res.json();
            if (data.results?.[0]) {
                const info = data.results[0];
                document.getElementById("tmdbOverview").innerText = info.overview || "Sin descripción.";
                document.getElementById("tmdbMeta").innerText = `${info.release_date || info.first_air_date} • ⭐ ${info.vote_average}`;
            }
        } else { throw new Error(); }
    } catch {
        document.getElementById("tmdbOverview").innerText = "Información no disponible actualmente.";
    }

    const playBtn = document.getElementById("modalPlayBtn");
    if (v.tipo === "pelicula" || v.tipo === "cine") {
        playBtn.style.display = "block";
        playBtn.onclick = () => window.openVideo(v);
        document.getElementById("episodeList").innerHTML = "";
    } else {
        playBtn.style.display = "none";
        renderEpisodes(v);
    }
};

function renderEpisodes(v) {
    const list = document.getElementById("episodeList");
    list.innerHTML = "";
    if (v.temporadas) {
        v.temporadas[0].episodios.forEach((ep, i) => {
            const btn = document.createElement("button");
            btn.innerText = `E${i+1} - ${ep.titulo}`;
            btn.onclick = () => window.openVideo(ep);
            list.appendChild(btn);
        });
    }
}

window.closeSeriesModal = () => document.getElementById("seriesModal").style.display = "none";

function renderContinue() {
    const data = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");
    const row = document.getElementById("continueRow");
    const list = Object.keys(data).map(id => {
        const base = allVideos.find(v => v.titulo === id);
        return base ? { ...base, _prog: data[id] } : null;
    }).filter(v => v && v._prog.time > 5).sort((a,b) => b._prog.updated - a._prog.updated);
    
    row.innerHTML = "";
    list.slice(0,10).forEach(v => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => window.openSeriesModal(v);
        const pct = (v._prog.time / v._prog.duration) * 100;
        card.innerHTML = `<img src="${v.img}"><div class="continue-overlay"><div class="continue-line"><div class="continue-progress" style="width:${pct}%"></div></div></div>`;
        row.appendChild(card);
    });
    document.getElementById("contHeader").style.display = list.length ? "block" : "none";
}

function toggleWatchLater(v) {
    let list = JSON.parse(localStorage.getItem(WATCHLATER_KEY) || "[]");
    const idx = list.findIndex(i => i.titulo === v.titulo);
    if(idx > -1) list.splice(idx, 1); else list.push(v);
    localStorage.setItem(WATCHLATER_KEY, JSON.stringify(list));
    renderWatchLater();
}

function renderWatchLater() {
    const list = JSON.parse(localStorage.getItem(WATCHLATER_KEY) || "[]");
    const header = document.getElementById("watchLaterHeader");
    header.style.display = list.length ? "block" : "none";
    renderCarousel("watchLaterRow", list);
}

function setupHero() {
    const cine = allVideos.filter(v => v.tipo === "cine");
    if(!cine.length) return;
    const p = cine[0];
    const hero = document.getElementById("heroBanner");
    hero.style.display = "block";
    hero.style.backgroundImage = `url(${p.img})`;
    document.getElementById("heroTitle").innerText = p.titulo;
    document.getElementById("heroPlayBtn").onclick = () => window.openSeriesModal(p);
}

document.getElementById("loginBtn").onclick = async () => {
    try {
        await signInWithEmailAndPassword(auth, document.getElementById("loginUser").value, document.getElementById("loginPass").value);
    } catch { document.getElementById("loginError").style.display = "block"; }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById("loginModal").style.display = "none";
        playerController.init();
        const r = await fetch(WORKER_URL);
        allVideos = await r.json();
        buildUI();
    } else {
        document.getElementById("loginModal").style.display = "flex";
    }
});
</script>
</body>
</html>
