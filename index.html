    <script>
    window.castAvailable = false;
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (isAvailable && window.cast && window.chrome) {
        window.castAvailable = true;
        const btn = document.getElementById("castBtn");
        if (btn) btn.style.display = "inline-block";
      }
    };

    let heroPlayer; 

    function loadYouTubeIframeAPI(videoId) {
        if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            window.onYouTubeIframeAPIReady = () => createYTPlayer(videoId);
        } else {
            createYTPlayer(videoId);
        }
    }

    function createYTPlayer(videoId) {
        if (heroPlayer && heroPlayer.destroy) { heroPlayer.destroy(); }
        
        heroPlayer = new YT.Player('youtubePlayer', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'playlist': videoId, 'loop': 1, 'modestbranding': 1 },
            events: {
                'onReady': (event) => event.target.playVideo(),
                'onStateChange': (event) => {
                    if (event.data === 0 && window.setupHeroBanner) { 
                        window.setupHeroBanner(); 
                    }
                }
            }
        });
    }
    </script>

    <style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAt1E2XmlsxV52dAwRaXW_e4XdDQxiP8lg",
    authDomain: "midata-40f73.firebaseapp.com",
    projectId: "midata-40f73",
    storageBucket: "midata-40f73.firebasestorage.app",
    messagingSenderId: "104287406146",
    appId: "1:104287406146:web:d9fad446e22629559dc5db"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let allVideos = [];
let currentSeries = null;
let currentSeason = 0;
let currentEpisode = 0;

const WORKER_URL = "https://odd-credit-e6f8.rigobertin100.workers.dev";
const SEGMENT_SIZE = 10;
const loadedCounts = {};

const lazyLoader = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.classList.remove("lazy-hidden");
            observer.unobserve(img);
        }
    });
}, { rootMargin: "100px" });

async function checkInitialState() {
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("loginModal").style.display = "none";
            playerController.init();
            initGlobalEvents();

            const cachedData = localStorage.getItem('plusultra_catalog_cache');
            if (cachedData) { allVideos = JSON.parse(cachedData); buildUI(); }
            try { 
                const r = await fetch(WORKER_URL); 
                const data = await r.json(); 
                allVideos = data; 
                localStorage.setItem('plusultra_catalog_cache', JSON.stringify(data)); 
                buildUI(); 
            } catch (e) {}
        } else {
            document.getElementById("loginModal").style.display = "flex";
        }
    });
}

window.onload = checkInitialState;

function initGlobalEvents() {
    document.getElementById("mainCatalog").addEventListener("click", (e) => {
        const card = e.target.closest(".card");
        if (!card) return;
        const title = card.dataset.title;
        const video = allVideos.find(v => v.titulo.toLowerCase() === title);
        if (video) window.openSeriesModal(video);
    });
}

const STORAGE_KEY="plus_ultra_progress";
const getProgress = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

const playerController = {
    video: null, hls: null, currentId: null,
    init() {
        this.video = document.getElementById("video");
        this.video.ontimeupdate = () => {
            if (this.currentId && this.video.currentTime > 5) {
                const data = getProgress();
                data[this.currentId] = { 
                    time: this.video.currentTime, duration: this.video.duration, updated: Date.now(), 
                    season: currentSeries ? currentSeason : null, episode: currentSeries ? currentEpisode : null 
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }
        };
        this.video.onended = () => currentSeries ? window.nextEpisode() : window.closeVideo();
    },
    async play(v) {
        this.cleanup();
        this.currentId = currentSeries ? currentSeries.titulo : v.titulo;
        const saved = getProgress()[this.currentId];

        if (v.url.includes(".m3u8") && Hls.isSupported()) {
            this.hls = new Hls(); this.hls.loadSource(v.url); this.hls.attachMedia(this.video);
            this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                if(saved) this.video.currentTime = saved.time;
                this.video.play();
            });
        } else {
            this.video.src = v.url;
            this.video.onloadedmetadata = () => {
                if(saved) this.video.currentTime = saved.time;
                this.video.play();
            };
        }
    },
    cleanup() { if (this.hls) this.hls.destroy(); this.video.pause(); this.video.src = ""; }
};

window.openVideo = async (v) => {
    document.getElementById("seriesModal").style.display = "none";
    document.getElementById("player").style.display = "flex";
    
    const isMulti = currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime");
    document.getElementById("playerCustomControls").style.display = isMulti ? "flex" : "none";

    let finalUrl = v.url;
    if (v.fileKey) {
        try {
            const res = await fetch(`${WORKER_URL}?getFile=${v.fileKey}`);
            const data = await res.json();
            if (data.url) finalUrl = data.url;
        } catch (err) { console.error(err); }
    }
    playerController.play({...v, url: finalUrl}); 
};

window.closeVideo = () => {
    playerController.cleanup(); 
    document.getElementById("player").style.display = "none";
    if (currentSeries) window.openSeriesModal(currentSeries);
    renderContinue();
};

window.openSeriesModal = async (v) => {
    currentSeries = v;
    const modal = document.getElementById("seriesModal");
    modal.style.display = "flex";
    document.getElementById("modalScroll").scrollTop = 0;

    const modalHero = document.getElementById("modalHero");
    modalHero.style.backgroundImage = `url(${v.backdrop || v.img})`;
    document.getElementById("seriesTitle").innerText = v.titulo;
    document.getElementById("tmdbOverview").innerText = v.resumen || "Cargando descripción...";

    const playBtn = document.getElementById("modalPlayBtn");
    if (v.tipo !== "serie" && v.tipo !== "anime") {
        playBtn.style.display = "block";
        playBtn.onclick = () => { currentSeries = null; window.openVideo(v); };
    } else {
        playBtn.style.display = "none";
    }

    if(v.temporadas) {
        const sSelect = document.getElementById("seasonSelect");
        sSelect.innerHTML = "";
        v.temporadas.forEach((t, i) => {
            const opt = document.createElement("div");
            opt.className = `season-option ${i === 0 ? 'active' : ''}`;
            opt.innerText = t.numero;
            opt.onclick = () => {
                document.querySelectorAll(".season-option").forEach(el => el.classList.remove("active"));
                opt.classList.add("active");
                renderEpisodes(i);
            };
            sSelect.appendChild(opt);
        });
        renderEpisodes(0);
    }
};

function renderEpisodes(idx) {
    const list = document.getElementById("episodeList"); 
    list.innerHTML = "";
    currentSeries.temporadas[idx].episodios.forEach((ep, i) => {
        const btn = document.createElement("button");
        btn.innerText = ep.titulo;
        btn.onclick = () => { currentSeason = idx; currentEpisode = i; window.openVideo(ep); };
        list.appendChild(btn);
    });
}

window.nextEpisode = () => {
    const temp = currentSeries.temporadas[currentSeason];
    if (currentEpisode < temp.episodios.length - 1) { 
        currentEpisode++; window.openVideo(temp.episodios[currentEpisode]); 
    } else if (currentSeason < currentSeries.temporadas.length - 1) { 
        currentSeason++; currentEpisode = 0; window.openVideo(currentSeries.temporadas[currentSeason].episodios[currentEpisode]); 
    } else window.closeVideo();
};

window.prevEpisode = () => {
    if (currentEpisode > 0) { currentEpisode--; window.openVideo(currentSeries.temporadas[currentSeason].episodios[currentEpisode]); }
};

window.closeSeriesModal = () => { 
    document.getElementById("seriesModal").style.display = "none"; 
    currentSeries = null;
    setupHeroBanner(); 
};

async function setupHeroBanner() {
    const cine = allVideos.filter(v => v.tipo === "cine"); 
    if (cine.length === 0) return;
    const peli = cine[Math.floor(Math.random() * Math.min(cine.length, 10))];
    const banner = document.getElementById("heroBanner");
    banner.style.display = "block";
    banner.style.backgroundImage = `url(${peli.backdrop || peli.img})`;
    document.getElementById("heroTitle").innerText = peli.titulo;
    document.getElementById("heroPlayBtn").onclick = () => window.openVideo(peli);
}

function buildUI(){
    document.getElementById("app").innerHTML = `
        <div class="row" id="contHeader"><h2>🔄 Continuar</h2><div class="carousel" id="continueRow"></div></div>
        <div class="row"><h2>🍿 Cine</h2><div class="carousel" id="cineRow"></div></div>
        <div class="row"><h2>🎬 Películas</h2><div class="carousel" id="peliculasRow"></div></div>
        <div class="row"><h2>📺 Series</h2><div class="carousel" id="seriesRow"></div></div>
        <div class="row"><h2>🍥 Anime</h2><div class="carousel" id="animeRow"></div></div>`;
    renderAll(); 
    setupHeroBanner(); 
}

function renderAll(){
    const cats = [
        { id: "cineRow", data: allVideos.filter(v => v.tipo === "cine").reverse() },
        { id: "peliculasRow", data: allVideos.filter(v => v.tipo === "pelicula").reverse() },
        { id: "seriesRow", data: allVideos.filter(v => v.tipo === "serie").reverse() },
        { id: "animeRow", data: allVideos.filter(v => v.tipo === "anime").reverse() }
    ];
    cats.forEach(c => {
        const container = document.getElementById(c.id);
        loadedCounts[c.id] = 0;
        loadNextSegment(c.id, c.data);
        const sentinel = document.createElement("div"); sentinel.className = "loading-sentinel"; sentinel.innerText = "•••";
        container.appendChild(sentinel);
        new IntersectionObserver((ent) => { if(ent[0].isIntersecting) loadNextSegment(c.id, c.data); }, {root: container}).observe(sentinel);
    });
    renderContinue();
}

function loadNextSegment(id, data) {
    const container = document.getElementById(id);
    const start = loadedCounts[id] || 0;
    const segment = data.slice(start, start + SEGMENT_SIZE);
    segment.forEach(v => container.insertBefore(createCard(v), container.lastChild));
    loadedCounts[id] = start + segment.length;
}

function createCard(v) {
    const card = document.createElement("div"); 
    card.className = "card"; 
    card.dataset.title = v.titulo.toLowerCase();
    const img = document.createElement("img");
    img.classList.add("lazy-hidden");
    img.dataset.src = v.img; 
    lazyLoader.observe(img);
    card.appendChild(img);
    return card;
}

function renderContinue() {
    const data = getProgress(); 
    const row = document.getElementById("continueRow"); 
    if (!row) return;
    row.innerHTML = "";
    let list = Object.keys(data).map(id => { 
        const base = allVideos.find(v => v.titulo === id); 
        return base ? { ...base, _prog: data[id] } : null; 
    }).filter(v => v && v._prog.time > 5 && v._prog.time < v._prog.duration * 0.95);
    
    list.sort((a, b) => b._prog.updated - a._prog.updated).slice(0, 5).forEach(v => {
        const card = createCard(v);
        const pct = (v._prog.time / v._prog.duration) * 100;
        const overlay = document.createElement("div");
        overlay.className = "continue-overlay";
        overlay.innerHTML = `<div class="continue-line"><div class="continue-progress" style="width:${pct}%"></div></div>`;
        card.appendChild(overlay);
        card.onclick = () => window.openSeriesModal(v);
        row.appendChild(card);
    });
    document.getElementById("contHeader").style.display = list.length ? "block" : "none";
}

document.getElementById("search").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase().trim();
    const resCont = document.getElementById("searchResultsContainer");
    const resRow = document.getElementById("searchResultsRow");
    if (val.length > 0) {
        document.getElementById("mainCatalog").style.display = "none";
        document.getElementById("heroBanner").style.display = "none";
        resCont.style.display = "block";
        resRow.innerHTML = "";
        allVideos.filter(v => v.titulo.toLowerCase().includes(val)).slice(0, 20).forEach(v => resRow.appendChild(createCard(v)));
    } else {
        document.getElementById("mainCatalog").style.display = "block";
        document.getElementById("heroBanner").style.display = "block";
        resCont.style.display = "none";
    }
});

document.getElementById("loginBtn").onclick = async () => { 
    try { await signInWithEmailAndPassword(auth, document.getElementById("loginUser").value, document.getElementById("loginPass").value); } 
    catch(e) { document.getElementById("loginError").style.display = "block"; } 
};

window.logout = () => signOut(auth);
</script>
</body>
</html>
