<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.gstatic.com/cv/js/cast_sender.js"></script>
    
    <script>
    window.castAvailable = false;
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (isAvailable && window.cast && window.chrome) {
        window.castAvailable = true;
        const btn = document.getElementById("castBtn");
        if (btn) btn.style.display = "inline-block";
      }
    };

    let heroPlayer; 
    const TMDB_API_KEY = "eb68625e114563a6e99084803989c46d"; // API Key recuperada de la lógica de Index_3

    function loadYouTubeIframeAPI(videoId) {
        if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            window.onYouTubeIframeAPIReady = () => createYTPlayer(videoId);
        } else {
            createYTPlayer(videoId);
        }
    }

    function createYTPlayer(videoId) {
        if (heroPlayer && heroPlayer.destroy) { heroPlayer.destroy(); }
        heroPlayer = new YT.Player('youtubePlayer', {
            height: '100%', width: '100%', videoId: videoId,
            playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'playlist': videoId, 'loop': 1, 'modestbranding': 1 },
            events: { 'onReady': (event) => event.target.playVideo() }
        });
    }
    </script>

    <style>
        /* CSS MANTENIDO Y MEJORADO PARA WATCH LATER */
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: #000; color: white; padding-top: 90px; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .header { position: fixed; top: 0; left: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; z-index: 1000; background: rgba(18, 18, 18, 0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; }
        .logo{font-size:28px;font-weight:700;color:#0a84ff;}
        .header-right{display:flex;align-items:center;gap:10px;}
        .search {padding:10px 14px;border-radius:24px;border:none;font-size:15px;background:rgba(255,255,255,.1);color:white;width:120px;}
        .logout{padding:10px 14px;border:none;border-radius:12px;background:#ff3b30;color:#fff;font-weight:bold;cursor:pointer;}
        
        .hero-banner { position: relative; width: 100%; height: 60vh; background: #111 center/cover no-repeat; overflow: hidden; margin-top: -90px; display: none; }
        .hero-video-bg {position: absolute; top: 50%; left: 50%; width: 177.78vh; height: 100vh; transform: translate(-50%, -50%); pointer-events: none;}
        .hero-overlay {position: absolute; inset: 0; background: linear-gradient(to top, #000 5%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; z-index: 2;}
        #heroTitle {font-size: 32px; margin: 0; text-transform: uppercase;}
        .hero-btn {width: fit-content; padding: 12px 28px; background: #fff; color: #000; border-radius: 12px; font-weight: bold; border:none; margin-top: 15px;}

        .row{margin-top:30px;padding-left:20px;}
        .row h2{font-size:19px;margin-bottom:12px;color:rgba(255,255,255,0.9);}
        .carousel{display:flex;gap:12px;overflow-x:auto;padding-bottom:15px;scroll-behavior:smooth; -webkit-overflow-scrolling: touch;}
        .carousel::-webkit-scrollbar{display: none;}
        
        .card { width:150px;flex-shrink:0;aspect-ratio:2/3;position:relative;border-radius:12px;overflow:hidden;background: #2c2c2e; transition: transform 0.3s; }
        .card img{width:100%;height:100%;object-fit:cover;}

        .series-modal{position:fixed;inset:0;display:none;z-index:9999; background:#000;}
        .series-inner{width:100%;height:100%;background:#1c1c1e;overflow-y:auto;position:relative;}
        .modal-hero {width:100%; height:45vh; position:relative; background-size: cover; background-position: center;}
        .modal-hero::after { content:''; position:absolute; inset:0; background:linear-gradient(to top, #1c1c1e, transparent); }
        .modal-info-content {padding: 20px; position: relative; z-index: 2; margin-top: -60px;}
        .tmdb-title {font-size: 32px; margin: 0; font-weight: 800;}
        .tmdb-meta {color: #0a84ff; margin: 8px 0; font-weight: 600; font-size: 14px;}
        .tmdb-overview {font-size: 15px; line-height: 1.5; color: rgba(255,255,255,0.8); margin-top: 15px;}
        
        .info-right {display: flex; align-items: center; gap: 15px; margin-top: 25px;}
        .btn-play-now {flex: 1; padding: 16px; background: #0a84ff; color: white; border: none; border-radius: 14px; font-size: 17px; font-weight: bold;}
        .btn-watch-later { width: 54px; height: 54px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .btn-watch-later.active { background: #0a84ff; border-color: #0a84ff; content: '✓'; }

        .player{position:fixed;inset:0;display:none;z-index:10000; background:#000;}
        .close{position:absolute;top:20px;right:20px;font-size:20px;color:white;z-index:10001; background: rgba(0,0,0,0.5); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; backdrop-filter: blur(10px);}
        
        .episode-list{padding: 20px; display:flex; flex-direction:column; gap:10px;}
        .episode-list button {padding: 18px; background: #2c2c2e; border: none; border-radius: 12px; color: white; text-align: left; font-size: 15px; font-weight: 500;}
        
        #loginModal {position:fixed;inset:0;background:#000;display:none;justify-content:center;align-items:center;z-index:99999;}
        #loginBox {background:#1c1c1e;padding:30px;border-radius:24px;display:flex;flex-direction:column;gap:16px;width:85%; max-width: 320px;}
        #loginBox input {padding:14px;border-radius:12px;border:none;background:#2c2c2e;color:white;}
        #loginBox button {padding:14px;border:none;border-radius:12px;background:#0a84ff;color:#fff;font-weight:bold;}

        .continue-overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;pointer-events:none;}
        .continue-line{height:3px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden;}
        .continue-progress{height:100%;background:#0a84ff;}
        
        .season-option {padding:10px 20px;background:rgba(255,255,255,0.1);border-radius:12px;white-space:nowrap;font-weight:600;}
        .season-option.active {background:#0a84ff;}

        .custom-controls-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 80%; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 4000; pointer-events: none; box-sizing: border-box; }
        .nav-ep-btn { pointer-events: auto; background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px; border-radius: 50%; font-size: 18px; }
    </style>
</head>

<body>

<div id="loginModal">
    <div id="loginBox">
        <h2 style="text-align:center">PlusUltra</h2>
        <input id="loginUser" type="email" placeholder="Usuario">
        <input id="loginPass" type="password" placeholder="Contraseña">
        <button id="loginBtn">Entrar</button>
        <p id="loginError" style="color:#ff453a; display:none; text-align:center">Error de acceso</p>
    </div>
</div>

<div class="header">
    <div class="logo">PlusUltra</div>
    <div class="header-right">
        <input id="search" class="search" placeholder="Buscar...">
        <button class="logout" onclick="logout()">Salir</button>
    </div>
</div>

<div id="heroBanner" class="hero-banner">
    <div id="youtubePlayer" class="hero-video-bg"></div>
    <div class="hero-overlay">
        <h1 id="heroTitle"></h1>
        <button id="heroPlayBtn" class="hero-btn">▶ Ver Ahora</button>
    </div>
</div>

<div id="searchResultsContainer" class="row">
    <h2>🔍 Resultados</h2>
    <div class="carousel" id="searchResultsRow"></div>
</div>

<div id="mainCatalog">
    <div id="app"></div>
</div>

<div class="player" id="player">
    <div class="player-inner">
        <span class="close" onclick="window.closeVideo()">✕</span>
        <video id="video" playsinline controls></video>
        <div id="playerCustomControls" class="custom-controls-overlay">
            <button id="prevEpisodeBtn" class="nav-ep-btn" onclick="window.prevEpisode()">❮</button>
            <button id="nextEpisodeBtn" class="nav-ep-btn" onclick="window.nextEpisode()">❯</button>
        </div>
    </div>
</div>

<div class="series-modal" id="seriesModal">
    <div class="series-inner" id="modalScroll">
        <span class="close" onclick="window.closeSeriesModal()">✕</span>
        <div class="modal-hero" id="modalHero"></div>
        <div class="modal-info-content">
            <h1 class="tmdb-title" id="seriesTitle"></h1>
            <div class="tmdb-meta" id="tmdbMeta"></div>
            <div class="tmdb-overview" id="tmdbOverview"></div>
            
            <div class="info-right">
                <button class="btn-watch-later" id="modalWatchLaterBtn">+</button>
                <button class="btn-play-now" id="modalPlayBtn">Reproducir</button>
            </div>
        </div>
        <div id="seasonSelect" style="display:flex; gap:10px; overflow-x:auto; padding:10px 20px;"></div>
        <div class="episode-list" id="episodeList"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAt1E2XmlsxV52dAwRaXW_e4XdDQxiP8lg",
    authDomain: "midata-40f73.firebaseapp.com",
    projectId: "midata-40f73",
    storageBucket: "midata-40f73.firebasestorage.app",
    messagingSenderId: "104287406146",
    appId: "1:104287406146:web:d9fad446e22629559dc5db"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

let allVideos = [];
let currentSeries = null;
let currentSeason = 0;
let currentEpisode = 0;

const WORKER_URL = "https://odd-credit-e6f8.rigobertin100.workers.dev";
const WATCHLATER_KEY = "plus_ultra_watchlater";
const PROGRESS_KEY = "plus_ultra_progress";

// --- 1. JERARQUÍA DE FILAS (buildUI) ---
function buildUI(){
    document.getElementById("app").innerHTML = `
        <div class="row" id="recentHeader"><h2>🆕 Recién agregadas</h2><div class="carousel" id="recentRow"></div></div>
        <div class="row" id="contHeader"><h2>🔄 Continuar viendo</h2><div class="carousel" id="continueRow"></div></div>
        <div class="row" id="watchLaterHeader" style="display:none;"><h2>❤️ Mirar Después</h2><div class="carousel" id="watchLaterRow"></div></div>
        <div class="row"><h2>🍿 Cine</h2><div class="carousel" id="cineRow"></div></div>
        <div class="row"><h2>🎬 Películas</h2><div class="carousel" id="peliculasRow"></div></div>
        <div class="row"><h2>🍭 Kids</h2><div class="carousel" id="kidsRow"></div></div>
        <div class="row"><h2>📺 Series</h2><div class="carousel" id="seriesRow"></div></div>
        <div class="row"><h2>🍥 Anime</h2><div class="carousel" id="animeRow"></div></div>`;
    renderAll(); 
    setupHeroBanner(); 
}

// --- 2. REGLAS DE CONFORMACIÓN (processCategoryData) ---
function processCategoryData(data) {
    let reversed = [...data].reverse();
    let fixed = reversed.slice(0, 15);
    let toShuffle = reversed.slice(15);
    // Shuffle (Fisher-Yates)
    for (let i = toShuffle.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [toShuffle[i], toShuffle[j]] = [toShuffle[j], toShuffle[i]];
    }
    return [...fixed, ...toShuffle];
}

function renderAll(){
    // Recién agregadas (Últimos 30)
    const recent = [...allVideos].reverse().slice(0, 30);
    renderCarousel("recentRow", recent);

    // Categorías con lógica de Shuffle
    renderCarousel("cineRow", processCategoryData(allVideos.filter(v => v.tipo === "cine")));
    renderCarousel("peliculasRow", processCategoryData(allVideos.filter(v => v.tipo === "pelicula")));
    renderCarousel("kidsRow", processCategoryData(allVideos.filter(v => v.tipo === "kids")));
    renderCarousel("seriesRow", processCategoryData(allVideos.filter(v => v.tipo === "serie")));
    renderCarousel("animeRow", processCategoryData(allVideos.filter(v => v.tipo === "anime")));
    
    renderContinue();
    renderWatchLater();
}

function renderCarousel(id, data) {
    const container = document.getElementById(id);
    if (!container) return;
    container.innerHTML = "";
    data.forEach(v => container.appendChild(createCard(v)));
}

function createCard(v) {
    const card = document.createElement("div"); 
    card.className = "card"; 
    card.onclick = () => window.openSeriesModal(v);
    const img = document.createElement("img");
    img.src = v.img; 
    card.appendChild(img);
    return card;
}

// --- 3. INTEGRACIÓN DINÁMICA TMDB ---
window.openSeriesModal = async (v) => {
    currentSeries = v;
    const modal = document.getElementById("seriesModal");
    modal.style.display = "flex";
    document.getElementById("modalScroll").scrollTop = 0;

    // Reset visual
    document.getElementById("seriesTitle").innerText = v.titulo;
    document.getElementById("tmdbOverview").innerText = "Buscando información...";
    document.getElementById("tmdbMeta").innerText = "";
    document.getElementById("modalHero").style.backgroundImage = `url(${v.backdrop || v.img})`;

    // Lógica TMDB
    try {
        const query = encodeURIComponent(v.titulo);
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${query}&language=es-MX`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const info = data.results[0];
            document.getElementById("tmdbOverview").innerText = info.overview || "Sin descripción disponible.";
            document.getElementById("tmdbMeta").innerText = `${(info.release_date || info.first_air_date || "").split('-')[0]} • ⭐ ${info.vote_average}`;
            if (!v.backdrop) document.getElementById("modalHero").style.backgroundImage = `url(https://image.tmdb.org/t/p/original${info.backdrop_path})`;
        }
    } catch (e) { console.error("Error TMDB", e); }

    // Botón Watch Later State
    const wlBtn = document.getElementById("modalWatchLaterBtn");
    const wlData = JSON.parse(localStorage.getItem(WATCHLATER_KEY) || "[]");
    wlBtn.classList.toggle("active", wlData.some(item => item.titulo === v.titulo));
    wlBtn.onclick = () => toggleWatchLater(v);

    const playBtn = document.getElementById("modalPlayBtn");
    if (v.tipo !== "serie" && v.tipo !== "anime") {
        playBtn.style.display = "block";
        playBtn.onclick = () => { currentSeries = null; window.openVideo(v); };
    } else {
        playBtn.style.display = "none";
    }

    if(v.temporadas) {
        const sSelect = document.getElementById("seasonSelect");
        sSelect.innerHTML = "";
        v.temporadas.forEach((t, i) => {
            const opt = document.createElement("div");
            opt.className = `season-option ${i === 0 ? 'active' : ''}`;
            opt.innerText = `T${t.numero}`;
            opt.onclick = () => {
                document.querySelectorAll(".season-option").forEach(el => el.classList.remove("active"));
                opt.classList.add("active");
                renderEpisodes(i);
            };
            sSelect.appendChild(opt);
        });
        renderEpisodes(0);
    }
};

// --- 4. FUNCIÓN MIRAR DESPUÉS (Watch Later) ---
function toggleWatchLater(v) {
    let list = JSON.parse(localStorage.getItem(WATCHLATER_KEY) || "[]");
    const index = list.findIndex(item => item.titulo === v.titulo);
    
    if (index > -1) {
        list.splice(index, 1);
    } else {
        if (list.length >= 20) list.shift(); // Límite de 20 (borra el más viejo)
        list.push({ titulo: v.titulo, img: v.img, tipo: v.tipo });
    }
    
    localStorage.setItem(WATCHLATER_KEY, JSON.stringify(list));
    document.getElementById("modalWatchLaterBtn").classList.toggle("active");
    renderWatchLater();
}

function renderWatchLater() {
    const list = JSON.parse(localStorage.getItem(WATCHLATER_KEY) || "[]");
    const container = document.getElementById("watchLaterRow");
    const header = document.getElementById("watchLaterHeader");
    
    if (list.length > 0) {
        header.style.display = "block";
        container.innerHTML = "";
        list.reverse().forEach(item => {
            const baseVideo = allVideos.find(av => av.titulo === item.titulo);
            if (baseVideo) container.appendChild(createCard(baseVideo));
        });
    } else {
        header.style.display = "none";
    }
}

// Lógica de Reproducción y Firebase (Mantenida)
async function checkInitialState() {
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("loginModal").style.display = "none";
            playerController.init();
            try { 
                const r = await fetch(WORKER_URL); 
                allVideos = await r.json(); 
                buildUI(); 
            } catch (e) {}
        } else {
            document.getElementById("loginModal").style.display = "flex";
        }
    });
}

const playerController = {
    video: null, hls: null, currentId: null,
    init() {
        this.video = document.getElementById("video");
        this.video.ontimeupdate = () => {
            if (this.currentId && this.video.currentTime > 5) {
                const data = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");
                data[this.currentId] = { 
                    time: this.video.currentTime, duration: this.video.duration, updated: Date.now()
                };
                localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
            }
        };
        this.video.onended = () => currentSeries ? window.nextEpisode() : window.closeVideo();
    },
    async play(v) {
        this.cleanup();
        this.currentId = v.titulo;
        const saved = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}")[this.currentId];
        if (v.url.includes(".m3u8") && Hls.isSupported()) {
            this.hls = new Hls(); this.hls.loadSource(v.url); this.hls.attachMedia(this.video);
            this.hls.on(Hls.Events.MANIFEST_PARSED, () => { if(saved) this.video.currentTime = saved.time; this.video.play(); });
        } else {
            this.video.src = v.url;
            this.video.onloadedmetadata = () => { if(saved) this.video.currentTime = saved.time; this.video.play(); };
        }
    },
    cleanup() { if (this.hls) this.hls.destroy(); this.video.pause(); this.video.src = ""; }
};

window.openVideo = async (v) => {
    document.getElementById("seriesModal").style.display = "none";
    document.getElementById("player").style.display = "flex";
    const isMulti = currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime");
    document.getElementById("playerCustomControls").style.display = isMulti ? "flex" : "none";
    playerController.play(v); 
};

window.closeVideo = () => {
    playerController.cleanup(); 
    document.getElementById("player").style.display = "none";
    renderContinue();
};

window.closeSeriesModal = () => { document.getElementById("seriesModal").style.display = "none"; currentSeries = null; };

function renderEpisodes(idx) {
    const list = document.getElementById("episodeList"); 
    list.innerHTML = "";
    currentSeries.temporadas[idx].episodios.forEach((ep, i) => {
        const btn = document.createElement("button");
        btn.innerText = `E${i+1} - ${ep.titulo}`;
        btn.onclick = () => { currentSeason = idx; currentEpisode = i; window.openVideo(ep); };
        list.appendChild(btn);
    });
}

function renderContinue() {
    const data = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}"); 
    const row = document.getElementById("continueRow"); 
    if (!row) return;
    row.innerHTML = "";
    let list = Object.keys(data).map(id => { 
        const base = allVideos.find(v => v.titulo === id); 
        return base ? { ...base, _prog: data[id] } : null; 
    }).filter(v => v && v._prog.time > 5 && v._prog.time < v._prog.duration * 0.9);
    
    list.sort((a, b) => b._prog.updated - a._prog.updated).slice(0, 10).forEach(v => {
        const card = createCard(v);
        const pct = (v._prog.time / v._prog.duration) * 100;
        const overlay = document.createElement("div");
        overlay.className = "continue-overlay";
        overlay.innerHTML = `<div class="continue-line"><div class="continue-progress" style="width:${pct}%"></div></div>`;
        card.appendChild(overlay);
        row.appendChild(card);
    });
    document.getElementById("contHeader").style.display = list.length ? "block" : "none";
}

async function setupHeroBanner() {
    const cine = allVideos.filter(v => v.tipo === "cine"); 
    if (cine.length === 0) return;
    const peli = cine[Math.floor(Math.random() * Math.min(cine.length, 10))];
    const banner = document.getElementById("heroBanner");
    banner.style.display = "block";
    banner.style.backgroundImage = `url(${peli.backdrop || peli.img})`;
    document.getElementById("heroTitle").innerText = peli.titulo;
    document.getElementById("heroPlayBtn").onclick = () => window.openSeriesModal(peli);
}

document.getElementById("loginBtn").onclick = async () => { 
    try { await signInWithEmailAndPassword(auth, document.getElementById("loginUser").value, document.getElementById("loginPass").value); } 
    catch(e) { document.getElementById("loginError").style.display = "block"; } 
};
window.logout = () => signOut(auth);
window.onload = checkInitialState;
</script>
</body>
</html>
