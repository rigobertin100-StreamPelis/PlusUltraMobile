    <script>
    window.castAvailable = false;
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (isAvailable && window.cast && window.chrome) {
        window.castAvailable = true;
        const btn = document.getElementById("castBtn");
        if (btn) btn.style.display = "inline-block";
      }
    };

    // --- CORRECCIÓN HERO BANNER: FUNCIONES GLOBALES ---
    let heroPlayer; 

    function loadYouTubeIframeAPI(videoId) {
        if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            window.onYouTubeIframeAPIReady = () => createYTPlayer(videoId);
        } else {
            createYTPlayer(videoId);
        }
    }

    function createYTPlayer(videoId) {
        if (heroPlayer && heroPlayer.destroy) { heroPlayer.destroy(); }
        
        heroPlayer = new YT.Player('youtubePlayer', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'playlist': videoId, 'loop': 1, 'modestbranding': 1 },
            events: {
                'onReady': (event) => event.target.playVideo(),
                'onStateChange': (event) => {
                    if (event.data === 0 && window.setupHeroBanner) { 
                        window.setupHeroBanner(); 
                    }
                }
            }
        });
    }
    </script>

const appFirebase = initializeApp(firebaseConfig);

let allVideos = [];
let currentSeries = null;
let currentSeason = 0;
let currentEpisode = 0;

const getSignedCache = () => JSON.parse(sessionStorage.getItem("plusultra_signed_links") || "{}");
const setSignedCache = (key, url) => {
    const cache = getSignedCache();
    cache[key] = { url, timestamp: Date.now() };
    sessionStorage.setItem("plusultra_signed_links", JSON.stringify(cache));
};

const SEGMENT_SIZE = 10;
const loadedCounts = {};
const WORKER_URL = "https://odd-credit-e6f8.rigobertin100.workers.dev";

const lazyLoader = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.classList.remove("lazy-hidden");
            observer.unobserve(img);
        }
    });
}, { rootMargin: "100px" });


async function checkInitialState() {
    // 1. Forzamos la experiencia móvil automáticamente
    localStorage.setItem("user_experience", "mobile");

    // 2. Procedemos directamente con la lógica de Firebase
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("loginModal").style.display = "none";
            playerController.init();
            initGlobalEvents();

            const cachedData = localStorage.getItem('plusultra_catalog_cache');
            if (cachedData) { 
                allVideos = JSON.parse(cachedData); 
                buildUI(); 
            }
            try { 
                const r = await fetch(WORKER_URL); 
                const data = await r.json(); 
                allVideos = data; 
                localStorage.setItem('plusultra_catalog_cache', JSON.stringify(data)); 
                buildUI(); 
            } catch (e) {
                console.error("Error cargando catálogo:", e);
            }
        } else {
            document.getElementById("loginModal").style.display = "flex";
        }
    });
}

// Iniciar proceso
window.onload = checkInitialState;

function initGlobalEvents() {
    document.getElementById("mainCatalog").addEventListener("click", (e) => {
        const card = e.target.closest(".card");
        if (!card) return;

        const title = card.dataset.title;
        const video = allVideos.find(v => v.titulo.toLowerCase() === title);
        const isContinue = card.classList.contains("is-continue-card");

        if (video) {
            if (isContinue) {
                const data = getProgress();
                const p = data[video.titulo];
                if (video.tipo === "serie" || video.tipo === "anime") {
                    currentSeries = video;
                    currentSeason = p.season || 0;
                    currentEpisode = p.episode || 0;
                    const ep = video.temporadas[currentSeason].episodios[currentEpisode];
                    window.openVideo(ep);
                } else {
                    currentSeries = null;
                    window.openVideo(video);
                }
            } else {
                window.openSeriesModal(video);
            }
        }
    });
}

window.addEventListener('keydown', (e) => {
    const playerOpen = document.getElementById("player").style.display === "flex";
    const modalOpen = document.getElementById("seriesModal").style.display === "flex";
    const isFullScreen = !!(document.fullscreenElement || document.webkitFullscreenElement);

    if ([27, 8, 461, 10009].includes(e.keyCode)) {
        if (isFullScreen) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            e.preventDefault();
        } else if (playerOpen) {
            e.preventDefault(); window.closeVideo();
        } else if (modalOpen) {
            e.preventDefault(); window.closeSeriesModal();
        }
    }
    if (e.keyCode === 13) { 
        const active = document.activeElement; 
        if (active && active.tagName !== 'INPUT' && typeof active.click === 'function') {
            e.preventDefault(); active.click(); 
        }
    }
}, true);


window.toggleFullScreen = () => {
    const video = document.getElementById("video");
    if (video.requestFullscreen) video.requestFullscreen();
    else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
};

const STORAGE_KEY="plus_ultra_progress";
const WL_KEY = "plus_ultra_watchlater";
const getProgress = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
const getWatchLater = () => JSON.parse(localStorage.getItem(WL_KEY) || "[]");

    function showToast(message) {
    let toast = document.getElementById("toast-notify");
    if (!toast) {
        toast = document.createElement("div");
        toast.id = "toast-notify";
        toast.className = "toast";
        document.body.appendChild(toast);
    }
    toast.innerText = message;
    toast.classList.add("show");
    
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

const playerController = {
    video: null, 
    hls: null, 
    currentId: null, 
    idleTimer: null,
    lastSyncTime: 0,
    lastTouchTime: 0,

    async syncToFirebase() {
        if (!this.currentId || !auth.currentUser) return;
        const data = getProgress()[this.currentId];
        if (data) {
            try {
                const userRef = doc(db, "users", auth.currentUser.uid, "progress", this.currentId);
                await setDoc(userRef, data);
                this.lastSyncTime = this.video.currentTime;
            } catch (e) { console.error("Error sincronizando:", e); }
        }
    },

    init() {
        this.video = document.getElementById("video");
        this.video.ontimeupdate = () => {
            if (this.currentId && this.video.currentTime > 5) {
                const data = getProgress();
                data[this.currentId] = { 
                    time: this.video.currentTime, 
                    duration: this.video.duration, 
                    updated: Date.now(), 
                    season: (currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime")) ? currentSeason : null, 
                    episode: (currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime")) ? currentEpisode : null 
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

                if (Math.abs(this.video.currentTime - this.lastSyncTime) > 60) {
                    this.syncToFirebase();
                }
            }
        };

        this.video.onended = () => (currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime")) ? window.nextEpisode() : window.closeVideo();
        
        const nav = document.getElementById("playerNav");
        const resetTimer = () => {
            if (document.getElementById("player").style.display !== "flex") return;
            nav.style.opacity = "1";
            clearTimeout(this.idleTimer);
            this.idleTimer = setTimeout(() => { 
                if(!document.activeElement.closest('.player-nav')) nav.style.opacity = "0";
            }, 5000);
        };
        window.addEventListener("mousemove", resetTimer);
        window.addEventListener("keydown", resetTimer);
// Gesto de doble toque para celulares
        this.video.addEventListener("touchstart", (e) => {
            const now = Date.now();
            const delta = now - this.lastTouchTime;
            
            if (delta > 0 && delta < 300) {
                const touchX = e.touches[0].clientX;
                const width = window.innerWidth;
                
                if (touchX > width / 2) {
                    this.video.currentTime += 10;
                    showToast("+10s");
                } else {
                    this.video.currentTime -= 10;
                    showToast("-10s");
                }
                e.preventDefault(); 
            }
            this.lastTouchTime = now;
        });
    },

    async play(v) {
        this.cleanup();
        this.currentId = currentSeries ? currentSeries.titulo : v.titulo;
        const saved = getProgress()[this.currentId];

        const startVideo = () => {
            if (saved && (!currentSeries || (saved.season === currentSeason && saved.episode === currentEpisode))) {
                this.video.currentTime = saved.time;
            }
            this.video.play().catch(e => console.warn("Autoplay bloqueado", e));
        };

        if (v.url.includes(".m3u8") && Hls.isSupported()) {
            this.hls = new Hls(); 
            this.hls.loadSource(v.url); 
            this.hls.attachMedia(this.video);
            this.hls.on(Hls.Events.MANIFEST_PARSED, startVideo);
        } else {
            this.video.src = v.url;
            this.video.onloadedmetadata = startVideo;
        }
    },

    cleanup() { 
        this.syncToFirebase();
        if (this.hls) {
            this.hls.destroy();
            this.hls = null;
        }
        this.video.pause(); 
        this.video.src = ""; 
    }
};

window.openVideo = async (v) => {
    const playerNav = document.getElementById("playerNav");
    const videoElement = document.getElementById("video");
    const customOverlay = document.getElementById("playerCustomControls");

    document.getElementById("seriesModal").style.display = "none";
    document.getElementById("player").style.display = "flex";

    // Detectamos si es Serie o Anime
    const isMultiEpisode = currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime");

    // LÓGICA PARA CELULARES Y PANTALLAS
    if (window.innerWidth <= 600) {
        // En celulares (Mobile): Limpieza total, usamos controles nativos
        playerNav.style.display = "none";
        videoElement.controls = true; 
        customOverlay.style.display = "none";
    } else {
        // En pantallas grandes (TV/PC):
        if (isMultiEpisode) {
            // Si es serie, dejamos la barra para cambiar capítulos[cite: 1]
            playerNav.style.display = "flex";
            videoElement.controls = true;
            customOverlay.style.display = "none";
        } else {
            // Si es película, ocultamos todo y dejamos solo el player nativo[cite: 1]
            playerNav.style.display = "none";
            videoElement.controls = true;
            customOverlay.style.display = "none";
        }
    }

    let finalUrl = v.url;
    if (v.fileKey) {
        const cache = getSignedCache();
        const cachedItem = cache[v.fileKey];
        if (cachedItem && (Date.now() - cachedItem.timestamp < 45 * 60 * 1000)) {
            finalUrl = cachedItem.url;
        } else {
            try {
                const response = await fetch(`${WORKER_URL}?getFile=${v.fileKey}`);
                const data = await response.json();
                if (data.url) {
                    finalUrl = data.url;
                    setSignedCache(v.fileKey, finalUrl);
                }
            } catch (err) { console.error(err); }
        }
    }

    playerController.play({...v, url: finalUrl}); 

};

window.togglePlay = () => {
    const v = document.getElementById("video");
    if (v.paused) v.play(); else v.pause();
};

window.closeVideo = () => {
    playerController.cleanup(); 
    document.getElementById("player").style.display = "none";
    if (currentSeries) { 
        window.openSeriesModal(currentSeries);
    } else { 
    }
    renderContinue(5);
};

window.toggleWatchLater = (v) => {
    let list = getWatchLater();
    const index = list.findIndex(item => item.titulo === v.titulo);
    const btn = document.getElementById("modalWatchLaterBtn");

    if (index > -1) {
        list.splice(index, 1);
        btn.classList.remove("active");
        btn.innerText = "+";
        showToast("Quitado de Mirar Después");
    } else {
        if (list.length >= 20) {
            list.shift(); 
            showToast("Lista llena: Se actualizó el contenido antiguo");
        } else {
            showToast("Agregado a Mirar Después");
        }
        list.push(v);
        btn.classList.add("active");
        btn.innerText = "✓";
    }
    localStorage.setItem(WL_KEY, JSON.stringify(list));
    renderWatchLater();
};

window.openSeriesModal = async (v) => {
    currentSeries = v; 
    currentSeason = 0; 
    
    if (heroPlayer && heroPlayer.stopVideo) heroPlayer.stopVideo();

    const modal = document.getElementById("seriesModal");
    modal.style.display = "flex";
    document.getElementById("modalScroll").scrollTop = 0;

    const modalHero = document.getElementById("modalHero");
    modalHero.innerHTML = ""; 
    modalHero.style.backgroundImage = "none"; 

    document.getElementById("seriesTitle").innerText = v.titulo;
    document.getElementById("tmdbMeta").innerText = "Cargando...";
    document.getElementById("tmdbOverview").innerText = "";
    document.getElementById("seasonSelect").innerHTML = "";
    document.getElementById("episodeList").innerHTML = "";

    const wlBtn = document.getElementById("modalWatchLaterBtn");
    const isWL = getWatchLater().some(item => item.titulo === v.titulo);
    wlBtn.classList.toggle("active", isWL);
    wlBtn.innerText = isWL ? "✓" : "+";
    wlBtn.onclick = () => window.toggleWatchLater(v);

    if (v.trailerID) {
        modalHero.innerHTML = `
            <div style="position:absolute; inset:0; background:linear-gradient(to top, #1c1c1e, transparent); z-index:1;"></div>
            <iframe style="width:100%; height:100%; border:none; position:relative; z-index:0; opacity:0; transition: opacity 0.5s;" 
                src="https://www.youtube.com/embed/${v.trailerID}?autoplay=1&mute=1&loop=1&playlist=${v.trailerID}&controls=0&modestbranding=1" 
                onload="this.style.opacity='1'"
                allow="autoplay; encrypted-media" allowfullscreen>
            </iframe>`;
    } else {
        const imgRespaldo = v.backdrop || v.img; 
        if (imgRespaldo) {
            modalHero.style.backgroundImage = `url(${imgRespaldo})`;
            modalHero.style.backgroundSize = "cover";
            modalHero.style.backgroundPosition = "center";
            modalHero.innerHTML = `<div style="position:absolute; inset:0; background:linear-gradient(to top, #1c1c1e, transparent)"></div>`;
        }
    }

    const playBtn = document.getElementById("modalPlayBtn");
    if (v.tipo === "pelicula" || v.tipo === "cine" || v.tipo === "kids") {
        playBtn.style.display = "block";
        playBtn.innerText = "Iniciar Película";
        playBtn.onclick = () => { currentSeries = null; window.openVideo(v); };
    } else {
        playBtn.style.display = "none";
    }

    if (!v.resumen) {
        const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=9db71febe6f2e19d653ab88b8ff729b6&query=${encodeURIComponent(v.titulo)}&language=es-MX`;
        try {
            const res = await fetch(searchUrl);
            const data = await res.json();
            if (data.results && data.results.length > 0) {
                const info = data.results[0];
                v.resumen = info.overview;
                v.estreno = info.release_date;
                v.rating = info.vote_average;
                if (info.backdrop_path && !v.trailerID) {
                    v.backdrop = `https://image.tmdb.org/t/p/w1280${info.backdrop_path}`;
                    modalHero.style.backgroundImage = `url(${v.backdrop})`;
                }
            }
        } catch (err) { console.error("Error cargando TMDB:", err); }
    }

    document.getElementById("tmdbMeta").innerText = `${v.estreno || ''} • ${v.rating || '0.0'} ★`;
    document.getElementById("tmdbOverview").innerText = v.resumen || "Sin descripción disponible.";

    if(v.tipo === "serie" || v.tipo === "anime") {
        v.temporadas.forEach((t, i) => {
            const opt = document.createElement("div"); 
            opt.className = `season-option ${i === 0 ? 'active' : ''}`; 
            opt.innerText = t.numero; 
            opt.tabIndex = 0;
            opt.onclick = () => { 
                currentSeason = i; 
                currentEpisode = 0;
                document.querySelectorAll(".season-option").forEach(el => el.classList.remove("active")); 
                opt.classList.add("active"); 
                renderEpisodes(i); 
            };
            document.getElementById("seasonSelect").appendChild(opt);
        });
        renderEpisodes(0);
    }
    
};
    
function renderEpisodes(idx) {
    const list = document.getElementById("episodeList"); 
    list.innerHTML = "";
    currentSeries.temporadas[idx].episodios.forEach((ep, i) => {
        const btn = document.createElement("button"); 
        btn.innerText = ep.titulo; 
        btn.tabIndex = 0;
        btn.onclick = (e) => { 
            e.preventDefault(); 
            currentSeason = idx; 
            currentEpisode = i;
            window.openVideo(ep); 
        };
        list.appendChild(btn);
    });
}

window.nextEpisode = () => {
    if (!currentSeries) return;
    const temp = currentSeries.temporadas[currentSeason];
    if (currentEpisode < temp.episodios.length - 1) { 
        currentEpisode++; window.openVideo(temp.episodios[currentEpisode]); 
    } else if (currentSeason < currentSeries.temporadas.length - 1) { 
        currentSeason++; currentEpisode = 0; 
        window.openVideo(currentSeries.temporadas[currentSeason].episodios[currentEpisode]); 
    } else window.closeVideo();
};

window.prevEpisode = () => {
    if (!currentSeries || (currentSeason === 0 && currentEpisode === 0)) return;
    if (currentEpisode > 0) {
        currentEpisode--;
    } else if (currentSeason > 0) {
        currentSeason--;
        currentEpisode = currentSeries.temporadas[currentSeason].episodios.length - 1;
    }
    renderEpisodes(currentSeason);
    window.openVideo(currentSeries.temporadas[currentSeason].episodios[currentEpisode]);
};

window.closeSeriesModal = () => { 
    document.getElementById("seriesModal").style.display = "none"; 
    document.getElementById("modalHero").innerHTML = "";
    currentSeries = null; 
    currentSeason = 0;
    setupHeroBanner();

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function processCategoryData(data) {
    const sorted = [...data].reverse();
    if (sorted.length <= 15) return sorted;
    const first15 = sorted.slice(0, 15);
    const rest = shuffleArray(sorted.slice(15));
    return first15.concat(rest);
}

function renderAll(){
    const sections = [ 
        // Esta fila toma los últimos 30 subidos al bucket sin importar la categoría
        { id: "recentRow", data: [...allVideos].slice(-30).reverse() }, 
        
        // Estas filas usan la nueva lógica de 15 fijos + resto random
        { id: "cineRow", data: processCategoryData(allVideos.filter(v => v.tipo === "cine")) },
        { id: "peliculasRow", data: processCategoryData(allVideos.filter(v => v.tipo === "pelicula")) }, 
        { id: "kidsRow", data: processCategoryData(allVideos.filter(v => v.tipo === "kids")) },
        { id: "seriesRow", data: processCategoryData(allVideos.filter(v => v.tipo === "serie")) }, 
        { id: "animeRow", data: processCategoryData(allVideos.filter(v => v.tipo === "anime")) } 
    ];

    sections.forEach(section => {
        const container = document.getElementById(section.id); 
        if(!container) return;
        container.innerHTML = ""; 
        loadedCounts[section.id] = 0; 
        loadNextSegment(section.id, section.data);
        
        const sentinel = document.createElement("div"); 
        sentinel.className = "loading-sentinel"; 
        sentinel.innerText = "•••"; 
        container.appendChild(sentinel);
        
        new IntersectionObserver((entries) => { 
            if (entries[0].isIntersecting) loadNextSegment(section.id, section.data); 
        }, { root: container, threshold: 0.1 }).observe(sentinel);
    });
    
    renderContinue(5);
    renderWatchLater();
}

function loadNextSegment(containerId, sourceData) {
    const container = document.getElementById(containerId); const sentinel = container.querySelector(".loading-sentinel");
    const start = loadedCounts[containerId] || 0; const segment = sourceData.slice(start, start + SEGMENT_SIZE);
    segment.forEach(v => { const card = createCard(v, false); sentinel ? container.insertBefore(card, sentinel) : container.appendChild(card); });
    loadedCounts[containerId] = start + segment.length;
    if (loadedCounts[containerId] >= sourceData.length && sentinel) sentinel.style.display = "none";
}

function createCard(v, isContinue = false) {
    const exp = localStorage.getItem("user_experience");
    const card = document.createElement("div"); 
    card.className = "card skeleton"; 
    card.tabIndex = 0; 
    card.dataset.title = v.titulo.toLowerCase();
    card.style.animationDelay = `${Math.random() * 0.2}s`;

    if (isContinue) card.classList.add("is-continue-card");

    const img = document.createElement("img");
    img.classList.add("lazy-hidden");
    img.dataset.src = v.img; 
    img.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
    
    img.onload = () => {
        card.classList.remove("skeleton");
        img.classList.remove("lazy-hidden");
    };
    lazyLoader.observe(img);
    card.appendChild(img);
    
    if (exp !== 'tv') {
        card.onclick = (e) => { 
            e.preventDefault(); 
            if (isContinue) {
                if (v.tipo === "serie" || v.tipo === "anime") {
                    currentSeries = v;
                    currentSeason = v._prog.season || 0;
                    currentEpisode = v._prog.episode || 0;
                    const ep = v.temporadas[currentSeason].episodios[currentEpisode];
                    window.openVideo(ep);
                } else {
                    currentSeries = null;
                    window.openVideo(v); 
                }
            } else {
                window.openSeriesModal(v); 
            }
        };
    }
    return card;
}

function renderContinue(limite = 5) {
    const data = getProgress(); 
    const row = document.getElementById("continueRow"); 
    const container = document.getElementById("contHeader"); 
    if (!row || !container) return;
    row.innerHTML = "";
    
    let list = Object.keys(data).map(id => { 
        const base = allVideos.find(v => v.titulo.trim() === id.trim()); 
        return base ? { ...base, _prog: data[id] } : null; 
    }).filter(v => v && v._prog.time > 5 && v._prog.time < v._prog.duration * 0.95);
    
    list.sort((a, b) => b._prog.updated - a._prog.updated);
    const finalDisplay = list.slice(0, limite); 
    container.style.display = finalDisplay.length === 0 ? "none" : "block";

    finalDisplay.forEach(v => {
        const p = v._prog; 
        const pct = (p.time / p.duration) * 100;
        let info = (v.tipo === "serie" || v.tipo === "anime") ? `T${(p.season || 0) + 1}:E${(p.episode || 0) + 1}` : `Faltan ${Math.ceil((p.duration - p.time)/60)} min`;
        
        const card = createCard(v, true); 
        const overlay = document.createElement("div");
        overlay.className = "continue-overlay";
        overlay.innerHTML = `
            <div class="continue-info">${info}</div>
            <div class="continue-line">
                <div class="continue-progress" style="width:${pct}%"></div>
            </div>`;
        card.appendChild(overlay);
        row.appendChild(card);
    });
}

function renderWatchLater() {
    const list = getWatchLater();
    const row = document.getElementById("watchLaterRow");
    const header = document.getElementById("wlHeader");
    if (!row || !header) return;
    row.innerHTML = "";
    if (list.length === 0) {
        header.style.display = "none";
    } else {
        header.style.display = "block";
        [...list].reverse().forEach(v => row.appendChild(createCard(v)));
    }
}
